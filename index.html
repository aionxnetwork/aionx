<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AionX Proto - Full Screen View</title>
    <style>
        /* 重置默认样式，确保全屏无间隙 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止出现双重滚动条 */
            background-color: #ffffff;
        }

        /* 容器样式：占满整个视口 */
        .embed-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Iframe 样式：完全填充容器，无边框 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 可选：加载时的简单淡入效果 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
    </style>
</head>
<body>

    <!-- 
      全屏嵌入容器 
      注意：由于去掉了导航栏，这里没有额外的控制按钮。
      如果目标网站支持，用户可以通过浏览器原生功能或网站内部UI进行交互。
    -->
    <div class="embed-container">
        <iframe 
            src="https://aionxproto-9newq5w9.manus.space" 
            title="AionX Proto Official Site"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
            class="fade-in"
        ></iframe>
    </div>

    <script>
        // 简单的错误处理提示（仅在控制台输出，不干扰界面）
        const iframe = document.querySelector('iframe');
        
        iframe.addEventListener('load', () => {
            console.log('AionX Proto loaded successfully.');
        });

        iframe.addEventListener('error', () => {
            console.error('Failed to load AionX Proto.');
            // 由于要求隐藏导航栏且无缝嵌入，这里不显示DOM错误提示，
            // 以免破坏“无缝”的视觉效果。用户若看到白屏，通常会自行刷新或检查网络。
        });
    </script>
</body>
</html>
